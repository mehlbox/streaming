services:
  nginx:
    image: alfg/nginx-rtmp:latest
    container_name: nginx-rtmp
    profiles: ["main"]
    entrypoint: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.conf"]
    ports:
      - "1935:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./flask/static:/var/www/static:ro
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls
    depends_on:
      web:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTP router with redirect to HTTPS
      - "traefik.http.routers.streaming-http.rule=Host(`${STREAMING_HOST}`)"
      - "traefik.http.routers.streaming-http.entrypoints=web"
      - "traefik.http.routers.streaming-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS router
      - "traefik.http.routers.streaming.rule=Host(`${STREAMING_HOST}`)"
      - "traefik.http.routers.streaming.entrypoints=websecure"
      - "traefik.http.routers.streaming.tls.certresolver=myresolver"
      - "traefik.http.services.streaming.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -s /var/run/nginx.pid || test -s /run/nginx.pid || ps | grep -q '[n]ginx: master'"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  audio:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: ffmpeg-audio
    profiles: ["main"]
    depends_on:
      nginx:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: []
    volumes:
      - ./start-audio.sh:/usr/local/bin/start-audio:ro
      - hls_data:/var/www/hls
    command: ["/usr/local/bin/start-audio"]
    restart: unless-stopped

  web:
    image: python:3.12-slim
    container_name: flask-web
    profiles: ["main"]
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    expose:
      - "5000"
    working_dir: /app
    volumes:
      - ./flask:/app
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python app.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, socket; socket.setdefaulttimeout(2); urllib.request.urlopen('http://localhost:5000/status');"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Satellite services ──────────────────────────────────────────────
  satellite-nginx:
    image: nginx:1.27-alpine
    container_name: satellite-nginx
    profiles: ["satellite"]
    volumes:
      - ./satellite/nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - MAIN_SERVER_INTERNAL_URL=${MAIN_SERVER_INTERNAL_URL}
    ports:
      - "${SATELLITE_PORT:-8080}:80"
    command: >
      sh -c "envsubst '$$MAIN_SERVER_INTERNAL_URL' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  satellite-agent:
    image: python:3.12-slim
    container_name: satellite-agent
    profiles: ["satellite"]
    env_file:
      - .env
    working_dir: /agent
    volumes:
      - ./satellite:/agent:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python agent.py
      "
    depends_on:
      satellite-nginx:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hls_data:

networks:
  traefik:
    external: true
