x-python-service: &python-service
  image: python:3.12-slim
  env_file:
    - .env
  restart: unless-stopped

x-agent-service: &agent-service
  <<: *python-service
  working_dir: /agent
  volumes:
    - ./satellite:/agent:ro
  command:
    - sh
    - -c
    - |
      pip install --no-cache-dir -r requirements.txt &&
      python agent.py

services:
  nginx:
    image: alfg/nginx-rtmp:latest
    profiles:
      - main
    entrypoint:
      - nginx
      - -g
      - daemon off;
      - -c
      - /etc/nginx/nginx.conf
    ports:
      - "${RTMP_PORT:-1935}:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./flask/static:/var/www/static:ro
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls
      - hls_logs:/tmp/hls-logs
    depends_on:
      web:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}-http.rule=Host(`${STREAMING_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}-http.entrypoints=web
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}-http.middlewares=${COMPOSE_PROJECT_NAME:-streaming}-redirect-https
      - traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-streaming}-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-streaming}-redirect-https.redirectscheme.permanent=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}.rule=Host(`${STREAMING_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}.tls.certresolver=myresolver
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-streaming}.service=${COMPOSE_PROJECT_NAME:-streaming}
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-streaming}.loadbalancer.server.port=80
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "test -s /var/run/nginx.pid || test -s /run/nginx.pid || ps | grep -q '[n]ginx: master'"
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  audio:
    image: jrottenberg/ffmpeg:6.1-alpine
    profiles:
      - main
    depends_on:
      nginx:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: []
    volumes:
      - ./start-audio.sh:/usr/local/bin/start-audio:ro
      - hls_data:/var/www/hls
    command:
      - /usr/local/bin/start-audio
    # Reports unhealthy only when the input is live but the audio output has gone
    # stale (a genuine transcoder fault); healthy while idle. The in-script
    # watchdog in start-audio.sh is the primary self-heal — this is a monitoring
    # signal (visible in `docker ps`) and a hook for any external autoheal.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          now=$$(date +%s);
          in_mod=$$(stat -c %Y "/var/www/hls/$${STREAM_NAME:-live}.m3u8" 2>/dev/null || echo 0);
          stale=$${HLS_STALE_SECONDS:-15};
          { [ "$$in_mod" -eq 0 ] || [ $$((now - in_mod)) -gt "$$stale" ]; } && exit 0;
          out_mod=$$(stat -c %Y "/var/www/hls/$${AUDIO_STREAM_NAME}.m3u8" 2>/dev/null || echo 0);
          [ "$$out_mod" -ne 0 ] && [ $$((now - out_mod)) -le "$$stale" ]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s
    restart: unless-stopped

  web:
    <<: *python-service
    profiles:
      - main
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      HLS_ACCESS_LOG: /hls-logs/hls.log
      NGINX_STATUS_URL: http://nginx/nginx-status
      LOCAL_SATELLITE_NAME: main
      SATELLITE_CERT_CACHE_DIR: /satellite-certs
    expose:
      - "5000"
    working_dir: /app
    volumes:
      - ./flask:/app
      - ./satellite:/bootstrap/satellite:ro
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls:ro
      - hls_logs:/hls-logs:ro
      - ./satellite-certs:/satellite-certs
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir -r requirements.txt &&
        gunicorn --bind 0.0.0.0:5000 \
          --worker-class gevent \
          --workers ${GUNICORN_WORKERS:-4} \
          --worker-connections ${GUNICORN_WORKER_CONNECTIONS:-1000} \
          --backlog 2048 \
          --timeout 60 \
          --graceful-timeout 30 \
          --keep-alive 5 \
          --max-requests 10000 \
          --max-requests-jitter 1000 \
          --access-logfile - --error-logfile - \
          app:app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, socket; socket.setdefaulttimeout(2); urllib.request.urlopen('http://localhost:5000/status');"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s

  # Satellite services
  satellite-nginx:
    image: nginx:1.27-alpine
    profiles:
      - satellite
    volumes:
      - ./satellite/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - hls_logs:/tmp/hls-logs
    environment:
      MAIN_SERVER_INTERNAL_URL: ${MAIN_SERVER_INTERNAL_URL}
    ports:
      - "${SATELLITE_PORT:-8080}:80"
    command:
      - sh
      - -c
      - |
        envsubst '$$MAIN_SERVER_INTERNAL_URL' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
        nginx -g 'daemon off;'
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1/health
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  main-agent:
    <<: *agent-service
    profiles:
      - main
    environment:
      MAIN_SERVER_URL: http://web:5000
      NGINX_STATUS_URL: http://nginx/nginx-status
      SATELLITE_PUBLIC_URL: https://${STREAMING_HOST}
      SATELLITE_NAME: main
      HLS_ACCESS_LOG: /hls-logs/hls.log
    volumes:
      - ./satellite:/agent:ro
      - hls_logs:/hls-logs:ro
    depends_on:
      web:
        condition: service_healthy
      nginx:
        condition: service_healthy

  satellite-agent:
    <<: *agent-service
    profiles:
      - satellite
    environment:
      HLS_ACCESS_LOG: /hls-logs/hls.log
      CADDY_CERTIFICATES_DIR: /caddy-certificates
    volumes:
      - ./satellite:/agent:ro
      - hls_logs:/hls-logs:ro
      - ${CADDY_CERTIFICATES_DIR:-/var/lib/caddy/.local/share/caddy/certificates}:/caddy-certificates:ro
    depends_on:
      satellite-nginx:
        condition: service_healthy

volumes:
  hls_data:
  hls_logs:

networks:
  traefik:
    external: true
