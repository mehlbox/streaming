services:
  nginx:
    image: alfg/nginx-rtmp:latest
    container_name: nginx-rtmp
    entrypoint: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.conf"]
    ports:
      - "1935:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/var/www/hls
    depends_on:
      - web
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTP router with redirect to HTTPS
      - "traefik.http.routers.streaming-http.rule=Host(`streaming.bethaus-speyer.de`)"
      - "traefik.http.routers.streaming-http.entrypoints=web"
      - "traefik.http.routers.streaming-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS router
      - "traefik.http.routers.streaming.rule=Host(`streaming.bethaus-speyer.de`)"
      - "traefik.http.routers.streaming.entrypoints=websecure"
      - "traefik.http.routers.streaming.tls.certresolver=myresolver"
      - "traefik.http.services.streaming.loadbalancer.server.port=80"
    restart: unless-stopped

  audio:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: ffmpeg-audio
    depends_on:
      - nginx
    env_file:
      - .env
    entrypoint: []
    volumes:
      - hls_data:/var/www/hls
    command: ["sh", "-c", "while true; do ffmpeg -hide_banner -loglevel error -nostdin -fflags +genpts -use_wallclock_as_timestamps 1 -i \"rtmp://nginx/stream/$${STREAM_NAME:-live}?key=$${STREAM_KEY}\" -vn -c:a aac -b:a 128k -ar 48000 -ac 2 -af aresample=async=1 -f hls -hls_time 4 -hls_list_size 6 -hls_flags delete_segments+independent_segments -hls_segment_type fmp4 -hls_fmp4_init_filename audio_init.mp4 -hls_segment_filename /var/www/hls/audio_%03d.m4s /var/www/hls/audio.m3u8; sleep 2; done"]
    restart: unless-stopped

  web:
    image: python:3.12-slim
    container_name: flask-web
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    expose:
      - "5000"
    working_dir: /app
    volumes:
      - ./flask:/app
      - hls_data:/var/www/hls:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python app.py
      "
    restart: unless-stopped

volumes:
  hls_data:

networks:
  traefik:
    external: true
