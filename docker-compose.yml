services:
  nginx:
    image: alfg/nginx-rtmp:latest
    container_name: nginx-rtmp
    entrypoint: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.conf"]
    ports:
      - "1935:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./flask/static:/var/www/static:ro
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls
    depends_on:
      web:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTP router with redirect to HTTPS
      - "traefik.http.routers.streaming-http.rule=Host(`streaming.bethaus-speyer.de`)"
      - "traefik.http.routers.streaming-http.entrypoints=web"
      - "traefik.http.routers.streaming-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS router
      - "traefik.http.routers.streaming.rule=Host(`streaming.bethaus-speyer.de`)"
      - "traefik.http.routers.streaming.entrypoints=websecure"
      - "traefik.http.routers.streaming.tls.certresolver=myresolver"
      - "traefik.http.services.streaming.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -s /var/run/nginx.pid || test -s /run/nginx.pid || ps | grep -q '[n]ginx: master'"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  audio:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: ffmpeg-audio
    depends_on:
      nginx:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: []
    volumes:
      - ./start-audio.sh:/usr/local/bin/start-audio:ro
      - hls_data:/var/www/hls
    command: ["/usr/local/bin/start-audio"]
    restart: unless-stopped

  web:
    image: python:3.12-slim
    container_name: flask-web
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - DISCONNECT_LOG_PATH=/app/disconnect-debug.log
    expose:
      - "5000"
    working_dir: /app
    volumes:
      - ./flask:/app
      - ./data:/var/www/data:ro
      - hls_data:/var/www/hls:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python app.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, socket; socket.setdefaulttimeout(2); urllib.request.urlopen('http://localhost:5000/status');"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  hls_data:

networks:
  traefik:
    external: true
