<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>{{ page_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
  <link rel="icon" href="{{ favicon_url }}" type="{{ favicon_type }}" />
</head>
<body data-debug="0">
  <main id="main" role="main" class="main-content">
    <section class="content-section">
      <div class="container">
        <div class="scw-card admin-login-card">
          <h1 class="section-title">Admin</h1>
          <p class="scw-copy">Diese Seite ist nur mit Admin-Token erreichbar.</p>
          {% if login_error %}
          <p class="scw-status scw-status-error">{{ login_error }}</p>
          {% endif %}
          <form method="post" action="{{ url_for('admin_index') }}" class="scw-form">
            <label class="scw-field">
              <span>Admin-Token</span>
              <input type="password" name="token" autocomplete="current-password" required />
            </label>
            <div class="scw-actions">
              <button type="submit" class="scw-button">Anmelden</button>
              <a href="{{ url_for('index') }}" class="scw-button scw-button-secondary">Zurück</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
