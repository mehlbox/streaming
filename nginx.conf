error_log /dev/stdout info;

worker_processes auto;

events {
  worker_connections 1024;
}

rtmp {
  server {
    listen 1935;
    chunk_size 4096;
    on_connect http://web:5000/auth;

    application stream {
      live on;
      record off;
      on_publish http://web:5000/auth;

      hls on;
      hls_path /var/www/hls;
      hls_fragment 4;
      hls_playlist_length 24;
      hls_cleanup on;
    }
  }
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;
  log_format hls_viewers '$msec|$cookie_stream_viewer|$http_x_forwarded_for|$remote_addr|$http_x_satellite_proxy';

  server {
    listen 80;

    location /hls/ {
      if ($cookie_stream_viewer = "") {
        return 403;
      }
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
        video/mp4 mp4 m4s;
        audio/mp4 m4a;
      }
      alias /var/www/hls/;
      access_log /tmp/hls-logs/hls.log hls_viewers;
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    location /nginx-status {
      stub_status on;
      allow 172.0.0.0/8;
      allow 127.0.0.1;
      deny all;
    }

    location /static/ {
      alias /var/www/static/;
      add_header Cache-Control "public, max-age=300";
    }

    location /data/ {
      alias /var/www/data/;
      add_header Cache-Control "no-cache";
    }

    location / {
      proxy_pass http://web:5000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
