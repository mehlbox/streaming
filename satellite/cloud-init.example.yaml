#cloud-config
package_update: true
packages:
  - ca-certificates
  - curl

write_files:
  - path: /usr/local/bin/bootstrap-streaming-satellite.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/sh
      set -eu

      STREAMING_HOST="streaming.bethaus-speyer.de"
      BOOTSTRAP_TOKEN="xgzsToeLFCLMhl5OzRJZcjrDjdQXV340s62Xkwuk_Kk"
      # Designed uplink (Mbps) for this instance type. The main app fills this in
      # per server so capacity sizing has a sane basis if the speedtest fails.
      SATELLITE_DESIGNED_BANDWIDTH_MBPS="0"
      export SATELLITE_DESIGNED_BANDWIDTH_MBPS

      # The main app assigns node1/node2/... and remembers the mapping by IP.
      curl -fsSL "https://${STREAMING_HOST}/api/satellite/bootstrap.sh?token=${BOOTSTRAP_TOKEN}" | sh

runcmd:
  - [sh, -lc, '/usr/local/bin/bootstrap-streaming-satellite.sh']
